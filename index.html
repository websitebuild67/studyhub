<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив ИМСИТА | PRO v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --neon-color: #ffffff; --bg-dark: #000000; }
        
        body { 
            background: radial-gradient(circle at center, #111 0%, var(--bg-dark) 100%); 
            min-height: 100vh; color: #fff; transition: all 0.4s ease; 
            overflow-x: hidden; font-family: 'Inter', sans-serif;
        }

        /* Панель выбора стиля */
        .theme-panel { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .theme-btn { 
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon-color); 
            padding: 10px 22px; border-radius: 12px; font-weight: 900; font-size: 11px; 
            text-transform: uppercase; cursor: pointer; box-shadow: 0 0 15px var(--neon-color); 
            transition: 0.3s; 
        }
        
        .color-menu { 
            display: none; position: absolute; top: 60px; right: 0; 
            background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 25px; grid-template-columns: repeat(6, 1fr); 
            gap: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); width: 320px; 
        }
        
        .color-dot { 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; 
            border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 0 12px var(--dot-color); 
            background-color: var(--dot-color); transition: 0.3s; 
        }
        .color-dot:hover { transform: scale(1.2); box-shadow: 0 0 25px var(--dot-color); border-color: #fff; }

        /* Вкладки разделов (Лекции / Практики) */
        .section-tab { 
            cursor: pointer; padding: 25px; border-radius: 30px; 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.3s; text-align: center; 
        }
        .section-tab.active { 
            border: 2px solid var(--neon-color); 
            box-shadow: 0 0 30px var(--neon-color); 
            background: rgba(255,255,255,0.05); 
        }
        .section-tab:hover:not(.active) { background: rgba(255,255,255,0.05); transform: translateY(-3px); }

        /* Заголовки предметов */
        .subject-group-title { 
            border-left: 4px solid var(--neon-color); padding-left: 15px; 
            margin: 50px 0 25px 0; font-weight: 900; letter-spacing: 2px; 
            text-transform: uppercase; font-size: 1.4rem; color: var(--neon-color); 
            text-shadow: 0 0 10px var(--neon-color); 
        }

        /* Карточки работ */
        .glass-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            padding: 28px; border-radius: 32px; transition: 0.3s; 
            display: flex; flex-direction: column; min-height: 220px; 
            width: 100%; box-sizing: border-box; 
        }
        .glass-card:hover { border-color: var(--neon-color); box-shadow: 0 0 20px var(--neon-color); transform: translateY(-5px); }

        .glass-card h3 { 
            font-size: 1.25rem; font-weight: 800; line-height: 1.3; 
            margin-bottom: 25px; word-wrap: break-word; overflow-wrap: break-word; 
            white-space: normal; flex-grow: 1; 
        }

        .btn-open { 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; 
            display: block; width: 100%; padding: 15px 0; border-radius: 20px; 
            font-weight: 800; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.3s; margin-top: auto; 
        }
        .btn-open:hover { background: var(--neon-color); color: #000; box-shadow: 0 0 15px var(--neon-color); border-color: transparent; }

        /* Поиск */
        #search { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; border-radius: 22px; padding: 20px 30px; width: 100%; 
            outline: none; transition: 0.3s; font-size: 1.1rem;
        }
        #search:focus { border-color: var(--neon-color); box-shadow: 0 0 15px var(--neon-color); background: rgba(255,255,255,0.05); }

        .neon-text { color: var(--neon-color); text-shadow: 0 0 10px var(--neon-color); }
    </style>
</head>
<body class="antialiased">
    
    <div class="theme-panel">
        <button onclick="toggleMenu()" id="main-theme-btn" class="theme-btn">Стиль</button>
        <div id="color-menu" class="color-menu">
            <div class="color-dot" style="--dot-color: #ffffff;" onclick="setTheme('#ffffff')"></div>
            <div class="color-dot" style="--dot-color: #ff0000;" onclick="setTheme('#ff0000')"></div>
            <div class="color-dot" style="--dot-color: #ff4400;" onclick="setTheme('#ff4400')"></div>
            <div class="color-dot" style="--dot-color: #ff8800;" onclick="setTheme('#ff8800')"></div>
            <div class="color-dot" style="--dot-color: #ffcc00;" onclick="setTheme('#ffcc00')"></div>
            <div class="color-dot" style="--dot-color: #ffee00;" onclick="setTheme('#ffee00')"></div>
            <div class="color-dot" style="--dot-color: #d4ff00;" onclick="setTheme('#d4ff00')"></div>
            <div class="color-dot" style="--dot-color: #88ff00;" onclick="setTheme('#88ff00')"></div>
            <div class="color-dot" style="--dot-color: #39ff14;" onclick="setTheme('#39ff14')"></div>
            <div class="color-dot" style="--dot-color: #00ff88;" onclick="setTheme('#00ff88')"></div>
            <div class="color-dot" style="--dot-color: #00ffcc;" onclick="setTheme('#00ffcc')"></div>
            <div class="color-dot" style="--dot-color: #00f2ff;" onclick="setTheme('#00f2ff')"></div>
            <div class="color-dot" style="--dot-color: #00aaff;" onclick="setTheme('#00aaff')"></div>
            <div class="color-dot" style="--dot-color: #0066ff;" onclick="setTheme('#0066ff')"></div>
            <div class="color-dot" style="--dot-color: #0000ff;" onclick="setTheme('#0000ff')"></div>
            <div class="color-dot" style="--dot-color: #4400ff;" onclick="setTheme('#4400ff')"></div>
            <div class="color-dot" style="--dot-color: #8800ff;" onclick="setTheme('#8800ff')"></div>
            <div class="color-dot" style="--dot-color: #bc13fe;" onclick="setTheme('#bc13fe')"></div>
            <div class="color-dot" style="--dot-color: #ff00ff;" onclick="setTheme('#ff00ff')"></div>
            <div class="color-dot" style="--dot-color: #ff00aa;" onclick="setTheme('#ff00aa')"></div>
            <div class="color-dot" style="--dot-color: #ff0055;" onclick="setTheme('#ff0055')"></div>
            <div class="color-dot" style="--dot-color: #ff5588;" onclick="setTheme('#ff5588')"></div>
            <div class="color-dot" style="--dot-color: #ff88aa;" onclick="setTheme('#ff88aa')"></div>
            <div class="color-dot" style="--dot-color: #aaaaaa;" onclick="setTheme('#aaaaaa')"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-16 animate__animated animate__fadeInDown">
            <h1 class="text-5xl md:text-7xl font-black mb-4 uppercase italic tracking-tighter">Архив<span class="neon-text"> ИМСИТА</span></h1>
            <p class="text-gray-500 tracking-widest uppercase text-xs font-bold opacity-60">Digital Study Hub / Release 5.0</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16 animate__animated animate__fadeInUp">
            <div onclick="setSection('практика')" id="tab-pract" class="section-tab active">
                <div class="text-4xl font-black mb-2 italic">ПРАКТИКИ</div>
                <div class="text-[10px] uppercase tracking-[0.5em] opacity-40">Практические задания</div>
            </div>
            <div onclick="setSection('лекция')" id="tab-lect" class="section-tab">
                <div class="text-4xl font-black mb-2 italic">ЛЕКЦИИ</div>
                <div class="text-[10px] uppercase tracking-[0.5em] opacity-40">Конспекты и теория</div>
            </div>
        </div>

        <div class="mb-16">
            <input type="text" id="search" placeholder="Поиск по архиву знаний..." class="animate__animated animate__fadeIn">
        </div>

        <div id="content" class="pb-20"></div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
