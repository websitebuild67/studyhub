<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Темы материалов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --neon-color: #bc13fe; }
        body { background: #000; color: #fff; font-family: sans-serif; min-height: 100vh; padding: 40px 20px; }
        .btn-back { color: var(--neon-color); font-weight: 800; text-transform: uppercase; text-decoration: none; margin-bottom: 40px; display: inline-block; transition: 0.3s; }
        .btn-back:hover { text-shadow: 0 0 10px var(--neon-color); }
        .topic-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 25px 35px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; transition: 0.3s; }
        .topic-row:hover { border-color: var(--neon-color); box-shadow: 0 0 15px var(--neon-color); }
        .btn-link { border: 1px solid var(--neon-color); padding: 10px 25px; border-radius: 12px; font-weight: 800; font-size: 11px; text-transform: uppercase; text-decoration: none; color: #fff; transition: 0.3s; }
        .btn-link:hover { background: var(--neon-color); color: #000; }
        .neon-text { text-shadow: 0 0 15px var(--neon-color); color: var(--neon-color); }
    </style>
</head>
<body>
    <div class="max-w-5xl mx-auto">
        <a href="index.html" class="btn-back">← Назад к списку</a>
        <header class="mb-12">
            <h1 id="subject-title" class="text-5xl md:text-7xl font-black italic uppercase neon-text">...</h1>
            <p id="section-label" class="text-gray-500 font-bold uppercase tracking-widest mt-4">РАЗДЕЛ</p>
        </header>
        <div id="topics-list" class="animate__animated animate__fadeInUp"></div>
    </div>

    <script>
        // Синхронизация цвета
        const savedColor = localStorage.getItem('user-neon') || '#bc13fe';
        document.documentElement.style.setProperty('--neon-color', savedColor);

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const type = params.get('type');

        document.getElementById('subject-title').innerText = name;
        document.getElementById('section-label').innerText = type === 'лекция' ? 'ЛЕКЦИИ' : 'ПРАКТИКИ';

        fetch('data.json').then(res => res.json()).then(data => {
            const filtered = data.filter(i => i.subject === name && i.type.toLowerCase().replace('пратика', 'практика') === type.toLowerCase());
            const container = document.getElementById('topics-list');
            container.innerHTML = filtered.map(t => `
                <div class="topic-row">
                    <div class="text-xl font-bold uppercase">${t.title}</div>
                    <a href="${t.link}" target="_blank" class="btn-link">Открыть</a>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
