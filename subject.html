<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Темы материалов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-color: #bc13fe; }
        body { background: #000; color: #fff; font-family: sans-serif; padding: 40px 20px; }
        .neon-text { color: var(--neon-color); text-shadow: 0 0 15px var(--neon-color); }
        .topic-row { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 12px; transition: 0.3s;
        }
        .topic-row:hover { border-color: var(--neon-color); background: rgba(255,255,255,0.05); }
        .btn-link { 
            background: var(--neon-color); color: #000; padding: 10px 25px; 
            border-radius: 12px; font-weight: 900; text-decoration: none; 
            text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }
        .btn-link:hover { filter: brightness(1.2); transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="max-w-3xl mx-auto">
        <a href="index.html" style="color: var(--neon-color); text-decoration: none; font-weight: bold; text-transform: uppercase;">← НАЗАД В АРХИВ</a>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 32px;">
            <h1 id="subject-title" class="text-4xl font-black uppercase neon-text">...</h1>
            <a id="tg-button" href="https://t.me/arhivImsita" target="_blank" style="display: none; background: var(--neon-color); color: #000; padding: 12px 25px; border-radius: 12px; font-weight: 900; text-decoration: none; text-transform: uppercase; font-size: 12px;">TG КАНАЛ</a>
        </div>
        <div id="topics-list" class="mt-10"></div>
    </div>

    <script>
        // Подтягиваем выбранный пользователем цвет
        const savedColor = localStorage.getItem('user-neon') || '#bc13fe';
        document.documentElement.style.setProperty('--neon-color', savedColor);

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const type = params.get('type');
        document.getElementById('subject-title').innerText = name;

        fetch('data.json').then(res => res.json()).then(data => {
            // Фильтруем данные по предмету и типу
            const filtered = data.filter(i => 
                i.subject === name && 
                i.type === type
            );

            const container = document.getElementById('topics-list');
            
            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-gray-500 uppercase font-bold">Материалов пока нет...</p>';
                return;
            }

            // Показываем кнопку Telegram в заголовке, если работ больше 5
            const tgButton = document.getElementById('tg-button');
            if (filtered.length > 5) {
                tgButton.style.display = 'inline-block';
            }

            // Ограничиваем вывод на 5 работ
            const displayed = filtered.slice(0, 5);
            const remaining = filtered.length - displayed.length;

            let html = displayed.map(t => `
                <div class="topic-row">
                    <span class="font-bold uppercase tracking-tight">${t.title}</span>
                    <a href="${t.link}" target="_blank" class="btn-link">
                        Открыть Диск
                    </a>
                </div>
            `).join('');

            // Добавляем кнопку для остальных работ, если их больше 5
            if (remaining > 0) {
                html += `
                    <div class="topic-row" style="background: rgba(188, 19, 254, 0.1); border-color: var(--neon-color);">
                        <span class="font-bold uppercase tracking-tight neon-text">Остальные ${remaining} работ в Telegram</span>
                        <a href="https://t.me/arhivImsita" target="_blank" class="btn-link">
                            В Telegram
                        </a>
                    </div>
                `;
            }

            container.innerHTML = html;
        });
    </script>
</body>
</html>
